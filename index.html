<style>
  :root {
    --primary: #e50914;
    --accent: #ff3d3d;
    --bg: #0a0a0a;
    --card-radius: 12px;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background-color: var(--bg);
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: sticky;
    top: 0;
    background-color: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  header .logo {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    text-align: center;
  }

  .search-wrapper {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  header input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    outline: none;
    background: #1a1a1a;
    color: #ffffff;
    font-size: 14px;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }

  header input:focus {
    background: #252525;
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
  }

  /* Marquee estilizado */
  .marquee {
    width: 100%;
    overflow: hidden;
    background: linear-gradient(90deg, #e50914, #800000);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 0;
    white-space: nowrap;
    margin-top: 0;
  }

  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* Grid de películas */
  .movies {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px 12px;
  }

  @media (min-width: 768px) {
    .movies { grid-template-columns: repeat(6, 1fr); gap: 20px; padding: 25px; }
  }

  .movie-card {
    position: relative;
    background-size: cover;
    background-position: center;
    aspect-ratio: 2/3;
    border-radius: var(--card-radius);
    cursor: pointer;
    display: block;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    overflow: hidden;
    background-color: #1a1a1a;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .movie-card:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 25px rgba(229, 9, 20, 0.3);
    z-index: 2;
  }

  /* Superposición oscura para que se vea el póster premium */
  .movie-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
    pointer-events: none;
  }

  .movie-card .quality-tag {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 6px;
    z-index: 10;
    text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }

  /* Skeleton Loading Animation */
  .skeleton {
    position: relative;
    aspect-ratio: 2/3;
    border-radius: var(--card-radius);
    background: linear-gradient(110deg, #121212 8%, #1a1a1a 18%, #121212 33%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  @keyframes shimmer {
    to {
      background-position-x: -200%;
    }
  }

  /* Loader */
  #loader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Pantalla de mantenimiento (controlada desde el panel) */
  #maintenance {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    z-index: 10000;
  }

  #maintenance .logo {
    font-size: 30px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    margin-bottom: 15px;
  }

  #maintenance p {
    color: #ccc;
    font-size: 14px;
    max-width: 320px;
    line-height: 1.6;
    margin: 0;
  }

  /* Ajustes del reproductor (mantenidos) */
  @media (orientation: landscape) {
    .header-player { height: 100vh; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loaderText" style="color: #aaa; margin-top: 15px; font-size: 13px; letter-spacing: 2px;">CARGANDO NUESTRO CONTENIDO</div>
</div>

<div id="maintenance">
  <div class="logo">FILMBOX</div>

<header>

    <input type="text" id="search" placeholder="Buscar películas o series...">

</header>

<div class="marquee" id="marqueeBar">

<section class="movies" id="movieList">

  <div class="skeleton"></div>
  <div class="skeleton"></div>

<!-- 🔌 CONEXIÓN CON EL PANEL DE CONTROL (Firebase Realtime DB)   -->
<!-- Esto NO cambia nada visualmente hasta que tú lo cambies      -->
<!-- desde panel.html. Si Firebase no responde, FILMBOX se ve     -->
<!-- exactamente igual que antes (valores por defecto abajo).     -->
<!-- ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  // 🔧 PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE (Firebase Console > Configuración del proyecto)
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCYbcKAlLZLPGWqBZi088STm3WoqBhGbuE",
  authDomain: "filmbox-panel.firebaseapp.com",
  databaseURL: "https://filmbox-panel-default-rtdb.firebaseio.com",
  projectId: "filmbox-panel",
  storageBucket: "filmbox-panel.firebasestorage.app",
  messagingSenderId: "42601341835",
  appId: "1:42601341835:web:852dc99d70bc6ac773058e"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

  // Valores por defecto = tu diseño original, tal cual está hoy.
  const defaultConfig = {
    loaderEnabled: true,
    loaderDuration: 3000,
    loaderText: "CARGANDO NUESTRO CONTENIDO",
    marqueeEnabled: true,
    marqueeText: "NUEVO CONTENIDO AGREGADO • LOS MEJORES ESTRENOS AQUÍ • DISFRUTA SIN LÍMITES • FILMBOX",
    searchPlaceholder: "Buscar películas o series...",
    defaultQuality: "HD",
    maintenanceMode: false,
    maintenanceMessage: "Estamos en mantenimiento. Vuelve pronto."
  };

  window.FILMBOX_CONFIG = { ...defaultConfig };

  function applyConfig(cfg) {
    document.getElementById('loaderText').textContent = cfg.loaderText;

    const marqueeBar = document.getElementById('marqueeBar');
    document.getElementById('marqueeText').textContent = cfg.marqueeText;
    marqueeBar.style.display = cfg.marqueeEnabled ? 'block' : 'none';

    const searchInput = document.getElementById('search');
    if (searchInput) searchInput.placeholder = cfg.searchPlaceholder;

    const maintenanceEl = document.getElementById('maintenance');
    if (cfg.maintenanceMode) {
      document.getElementById('maintenanceText').textContent = cfg.maintenanceMessage;
      maintenanceEl.style.display = 'flex';
      document.getElementById('loader').style.display = 'none';
    } else {
      maintenanceEl.style.display = 'none';
    }
  }

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const configRef = ref(db, 'config');

    onValue(configRef, (snapshot) => {
      const remote = snapshot.val() || {};
      window.FILMBOX_CONFIG = { ...defaultConfig, ...remote };
      applyConfig(window.FILMBOX_CONFIG);
    }, (error) => {
      console.warn('FILMBOX: no se pudo conectar con el panel, usando valores por defecto.', error);
      applyConfig(defaultConfig);
    });
  } catch (e) {
    console.warn('FILMBOX: Firebase no está configurado todavía, usando valores por defecto.', e);
    applyConfig(defaultConfig);
  }
</script>

<!-- Scripts (Tus funciones originales, con pequeños ajustes para leer la configuración) -->
<script>
const movieList = document.getElementById('movieList');
const searchInput = document.getElementById('search');
let moviesData = [];

// Cargar JSON
fetch('Peliculas.json')
  .then(response => response.json())
  .then(data => {
    moviesData = data;
    renderMovies(moviesData);
  });

// Función para mostrar películas
function renderMovies(movies) {
  movieList.innerHTML = '';
  const cfg = window.FILMBOX_CONFIG || {};
  movies.forEach(movie => {
    const a = document.createElement('a');
    a.className = 'movie-card';
    a.href = movie.link;
    a.dataset.title = movie.title;
    a.style.backgroundImage = `url('${movie.poster}')`;

    const span = document.createElement('span');
    span.className = 'quality-tag';
    span.textContent = movie.quality || cfg.defaultQuality || 'HD';

    a.appendChild(span);
    movieList.appendChild(a);
  });
}

// Lógica de búsqueda e historial (Tu código original)
let isSearching = false;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();

  if (q.length > 0 && !isSearching) {
    history.pushState({ search: true }, '');
    isSearching = true;
  }

  if (q.length === 0) {
    isSearching = false;
    searchInput.blur();
  }

  const filtered = moviesData.filter(movie =>
    movie.title.toLowerCase().includes(q)
  );

  renderMovies(filtered);
});

window.addEventListener('popstate', () => {
  if (isSearching || searchInput.value !== '') {
    searchInput.value = '';
    renderMovies(moviesData);
    isSearching = false;
    searchInput.blur();
    history.pushState({ search: false }, '');
  }
});

// Loader logic (ahora respeta loaderEnabled / loaderDuration del panel)
window.addEventListener("load", function() {
  const loader = document.getElementById("loader");
  const cfg = window.FILMBOX_CONFIG || {};

  if (cfg.loaderEnabled === false) {
    loader.style.display = "none";
    return;
  }
  if (sessionStorage.getItem("loaderShown")) {
    loader.style.display = "none";
    return;
  }
  const duration = cfg.loaderDuration || 3000;
  setTimeout(() => {
    loader.style.transition = "opacity 0.8s ease";
    loader.style.opacity = 0;
    setTimeout(() => { loader.style.display = "none"; }, 800);
  }, duration);
  sessionStorage.setItem("loaderShown", "true");
});

// Scroll persistence
window.addEventListener("beforeunload", () => {
  sessionStorage.setItem("scrollPos", window.scrollY);
});

window.addEventListener("load", () => {
  const scrollPos = sessionStorage.getItem("scrollPos");
  if (scrollPos) {
    setTimeout(() => { window.scrollTo(0, parseInt(scrollPos)); }, 100);
  }
});
</script>
